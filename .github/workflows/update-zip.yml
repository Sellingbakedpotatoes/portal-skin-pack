name: Update Skin Pack ZIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Check out portal-skin-pack
        uses: actions/checkout@v4
        with:
          repository: Sellingbakedpotatoes/portal-skin-pack

      - name: Download ZIP from site
        run: |
          curl -L \
            --connect-timeout 30 \
            --max-time 300 \
            --retry 3 \
            --retry-delay 10 \
            "https://portal-skin-forge.base44.app/pack" \
            -o portalmod_skin_override.zip

      - name: Show downloaded file info
        run: |
          ls -lh portalmod_skin_override.zip
          file portalmod_skin_override.zip

      - name: Create release if missing
        run: |
          gh release view latest-skin-pack --repo Sellingbakedpotatoes/portal-skin-pack || \
          gh release create latest-skin-pack \
            --repo Sellingbakedpotatoes/portal-skin-pack \
            --title "Latest Skin Pack" \
            --notes "Automatically updated skin pack."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to release
        run: |
          gh release upload latest-skin-pack portalmod_skin_override.zip \
            --repo Sellingbakedpotatoes/portal-skin-pack \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
